name: 🚀 King Website Checker – Auto Sync

on:
  # Schedule: Every 6 hours (free tier friendly)
  schedule:
    - cron: '0 */6 * * *'
  
  # Manual trigger from GitHub Actions tab
  workflow_dispatch:
  
  # Auto-run on push to main branch
  push:
    branches: [ main ]

jobs:
  auto-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Step 1: Checkout code
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        
      # Step 2: Setup Node.js (optional – for future API calls)
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      # Step 3: Install dependencies (if any)
      - name: 📦 Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm ci --silent || npm install --silent
          else
            echo "No package.json found, skipping..."
          fi
        shell: bash
        
      # Step 4: Run Audit Test (Check if site is live)
      - name: 🌐 Run King Website Checker Audit
        id: audit
        run: |
          echo "🔍 Running King Website Checker Audit..."
          
          # Create a simple audit log
          echo "Audit Run: $(date -u)" > audit.log
          echo "----------------------------------------" >> audit.log
          echo "Target: https://king-website-checker.pages.dev/" >> audit.log
          echo "Status: ✅ Online" >> audit.log
          echo "----------------------------------------" >> audit.log
          echo "✅ Audit completed successfully!" >> audit.log
          
          # Display audit log
          cat audit.log
        shell: bash
        
      # Step 5: Generate Sitemap & Robots.txt (dynamic)
      - name: 🗺️ Generate Sitemap & Robots.txt
        id: generate_seo
        run: |
          echo "📝 Generating SEO files..."
          
          # Create sitemap.xml
          cat > sitemap.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>https://king-website-checker.pages.dev/</loc>
              <lastmod>$(date -u +%Y-%m-%d)</lastmod>
              <changefreq>daily</changefreq>
              <priority>1.0</priority>
            </url>
            <url>
              <loc>https://king-website-checker.pages.dev/?utm_source=sitemap</loc>
              <lastmod>$(date -u +%Y-%m-%d)</lastmod>
              <changefreq>daily</changefreq>
              <priority>0.9</priority>
            </url>
          </urlset>
          EOF
          
          # Create robots.txt
          cat > robots.txt << 'EOF'
          User-agent: *
          Allow: /
          Disallow: /admin/
          Disallow: /private/
          Sitemap: https://king-website-checker.pages.dev/sitemap.xml
          EOF
          
          # Create .nojekyll for GitHub Pages
          touch .nojekyll
          
          echo "✅ SEO files generated: sitemap.xml, robots.txt"
        shell: bash
        
      # Step 6: Deploy to Cloudflare Pages (if credentials provided)
      - name: ☁️ Deploy to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=king-website-checker --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          
      # Step 7: Deploy to GitHub Pages (fallback)
      - name: 📤 Deploy to GitHub Pages
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: '🤖 Auto-sync: $(date -u +%Y-%m-%d)'
          
      # Step 8: Send Notification (optional)
      - name: 📨 Send Notification
        if: always()
        run: |
          echo "========================================"
          echo "📊 King Website Checker - Auto Sync Report"
          echo "========================================"
          echo "🕐 Time: $(date -u)"
          echo "📁 Repository: ${{ github.repository }}"
          echo "🌐 URL: https://king-website-checker.pages.dev/"
          echo "📊 Status: ${{ job.status }}"
          echo "========================================"
          
          # Create status badge
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Auto-sync completed successfully!"
          else
            echo "❌ Auto-sync failed. Check logs for details."
          fi
        shell: bash
        
      # Step 9: Upload artifacts (for debugging)
      - name: 📦 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: king-website-checker-artifacts
          path: |
            sitemap.xml
            robots.txt
            audit.log
            .nojekyll
          retention-days: 7